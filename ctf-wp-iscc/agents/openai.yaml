interface:
  display_name: "ctf-wp-iscc"
  short_description: "按 ISCC 模板生成带合规截图且无中文乱码的 CTF Word 题解"
  default_prompt: "使用 $ctf-wp-iscc 读取当前目录材料并按 skill 规范执行：先从 SKILL-CTF-WP-ISCC-AUTHOR-LINE 和 SKILL-CTF-WP-ISCC-OUTPUT-PREFIX 环境变量读取作者行和输出前缀；若缺失则先询问用户或要求设置环境变量；再询问题目名字、确认当前题目的原始附件范围；如果候选原始附件不唯一且用户未点名，先向用户确认后再继续；最终输出 ./<输出前缀>-<题目名称>.docx。其余写作、截图、脚本重写、审稿、字体与附件归属细则以 SKILL.md 为准。"

policy:
  allow_implicit_invocation: false
